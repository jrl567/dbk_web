<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Dandy Buzzkills: Contact</title>
  <link rel="stylesheet" href="styles/master.css">
  <link rel="stylesheet" href="styles/contact.css">
</head>
<body>
  <h1>Contact The Dandy Buzzkills</h1>
  <div class="content-box">
    <form id="contactForm">
      <input type="text" name="name" placeholder="Your Name" required>
      <input type="email" name="email" placeholder="Your Email" required>
      <textarea name="message" placeholder="Your Message" rows="5" required></textarea>
      <button type="submit">Send Message</button>
    </form>
  </div>
  <p><a href="index.html">Return to Homepage</a></p>

  <script>
    document.getElementById('contactForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const form = e.target;
      const name = form.name?.value || '';
      const email = form.email?.value || '';
      const message = form.message?.value || '';

      // Store the values in sessionStorage so they are available on the next pages
      try {
        sessionStorage.setItem('contact_name', name);
        sessionStorage.setItem('contact_email', email);
        sessionStorage.setItem('contact_message', message);
      } catch (err) {
        // ignore storage errors
        console.warn('sessionStorage unavailable:', err);
      }

      // Continue the existing flow
      window.location.href = 'interrogation.html';
    });
  </script>
</body>
</html>
