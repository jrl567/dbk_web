<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Dandy Buzzkills: Pictures</title>
  <link rel="stylesheet" href="styles/master.css">
  <link rel="stylesheet" href="styles/pictures.css">
</head>
<body>
  <h1>The Dandy Buzzkills: Pictures</h1>
  <div class="content-box">
    <div class="grid" id="photo-grid"></div>
<div id="lightbox" class="lightbox">
  <img id="lightbox-img" src="" alt="Expanded image">
</div>
      <!-- Images will be added by JavaScript -->
    </div>
  </div>
  <p><a href="index.html">Return to Homepage</a></p>

  <script>
    const grid = document.getElementById('photo-grid');
    const maxPics = 100; // hard limit to prevent infinite loops

    // Try to load thumbnail first (images/thumbs/picN.jpg). If missing,
    // fall back to the full-size image (images/picN.jpg). If neither
    // exists, do nothing.
    function tryAddImage(i) {
      const thumbSrc = `images/thumbs/pic${i}.jpg`;
      const fullSrc = `images/pic${i}.jpg`;

      const testThumb = new Image();
      testThumb.onload = () => {
        const el = document.createElement('img');
        el.src = thumbSrc;
        el.alt = `pic${i}`;
        el.dataset.full = fullSrc;
        el.addEventListener('click', () => {
          const lightbox = document.getElementById('lightbox');
          const lightboxImg = document.getElementById('lightbox-img');
          lightboxImg.src = fullSrc;
          lightbox.style.display = 'flex';
        });
        grid.appendChild(el);
      };

      testThumb.onerror = () => {
        // thumbnail missing — try the full-size image as a fallback
        const testFull = new Image();
        testFull.onload = () => {
          const el = document.createElement('img');
          el.src = fullSrc;
          el.alt = `pic${i}`;
          el.dataset.full = fullSrc;
          el.addEventListener('click', () => {
            const lightbox = document.getElementById('lightbox');
            const lightboxImg = document.getElementById('lightbox-img');
            lightboxImg.src = fullSrc;
            lightbox.style.display = 'flex';
          });
          grid.appendChild(el);
        };
        testFull.onerror = () => {
          // neither thumb nor full image exists — skip
        };
        testFull.src = fullSrc;
      };

      // Start by testing thumbnail existence
      testThumb.src = thumbSrc;
    }

    for (let i = 1; i <= maxPics; i++) tryAddImage(i);
  </script>
<script>
  const lightbox = document.getElementById('lightbox');
  const lightboxImg = document.getElementById('lightbox-img');

  // Close when clicking the overlay (but not when clicking the image itself)
  lightbox.addEventListener('click', () => {
    lightbox.style.display = 'none';
    lightboxImg.src = '';
  });
  lightboxImg.addEventListener('click', (e) => e.stopPropagation());
</script>
</body>
</html>
