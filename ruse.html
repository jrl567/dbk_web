<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Dandy Buzzkills: The Ruse</title>
  <link rel="stylesheet" href="styles/master.css">
  <link rel="stylesheet" href="styles/ruse.css">
</head>
<body>
  <div class="content-box">
    <div class="alert">It was all a ruse.</div>
    <p>Please remain seated. If you wish to contact us, copy your message and send an email to:</p>
    <div class="email">dandybuzzkills@gmail.com</div>
    <div style="margin-top:18px; display:flex; gap:12px; justify-content:center; flex-wrap:wrap;">
      <a href="#" id="copyMessageBtn" class="button">Copy message</a>
      <a href="index.html" class="button">Return Home</a>
    </div>
  </div>
  <div style="text-align:center; margin-top:8px; color:var(--fg); font-size:14px;" id="copyFeedback" aria-live="polite"></div>

  <script>
    async function copyText(text) {
      if (!text) return false;
      try {
        if (navigator.clipboard && navigator.clipboard.writeText) {
          await navigator.clipboard.writeText(text);
          return true;
        } else {
          // Fallback using textarea
          const ta = document.createElement('textarea');
          ta.value = text;
          ta.style.position = 'fixed'; ta.style.left = '-9999px';
          document.body.appendChild(ta);
          ta.select();
          const ok = document.execCommand('copy');
          document.body.removeChild(ta);
          return ok;
        }
      } catch (err) {
        return false;
      }
    }

    document.getElementById('copyMessageBtn').addEventListener('click', async function(e) {
      e.preventDefault();
      const feedback = document.getElementById('copyFeedback');
      const message = sessionStorage.getItem('contact_message') || '';
      if (!message) {
        feedback.textContent = 'No message found to copy.';
        return;
      }
      const success = await copyText(message);
      feedback.textContent = success ? 'Message copied to clipboard.' : 'Failed to copy message.';
      setTimeout(() => { feedback.textContent = ''; }, 3000);
    });
  </script>
</body>
</html>
